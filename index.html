<!DOCTYPE html>
<html>
<head>
  <title>Simple WebRTC Chat</title>

  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 20px auto;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
    }

    #messages {
      border: 1px solid #ccc;
      height: 200px;
      overflow-y: auto;
      padding: 10px;
      margin-top: 10px;
    }

    input {
      width: 80%;
      padding: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>WebRTC Text Chat</h2>

<button id="offerBtn">Create Offer</button>
<button id="answerBtn">Create Answer</button>
<button id="remoteBtn">Set Remote Description</button>

<textarea id="localSDP" placeholder="Local SDP"></textarea>

<textarea id="remoteSDP" placeholder="Paste Remote SDP"></textarea>

<div id="messages"></div>

<br>

<input id="messageInput" placeholder="Type message" />
<button id="sendBtn">Send</button>

<script>

const configuration = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

const pc = new RTCPeerConnection(configuration);

let dataChannel;

const localSDP = document.getElementById("localSDP");
const remoteSDP = document.getElementById("remoteSDP");
const messages = document.getElementById("messages");

function log(message) {
  console.log(message);

  const div = document.createElement("div");
  div.innerText = message;
  messages.appendChild(div);
}

// ICE candidate gathering
pc.onicecandidate = (event) => {

  if (!event.candidate) {
    localSDP.value = JSON.stringify(pc.localDescription);
    log("ICE Gathering Complete");
  }
};

// When receiving channel
pc.ondatachannel = (event) => {

  log("Data channel received");

  dataChannel = event.channel;

  setupDataChannel();
};

function setupDataChannel() {

  dataChannel.onopen = () => {
    log("Data channel OPEN");
  };

  dataChannel.onclose = () => {
    log("Data channel CLOSED");
  };

  dataChannel.onmessage = (event) => {
    log("Peer: " + event.data);
  };
}

// Create Offer
document.getElementById("offerBtn").onclick = async () => {

  dataChannel = pc.createDataChannel("chat");

  setupDataChannel();

  const offer = await pc.createOffer();

  await pc.setLocalDescription(offer);

  log("Offer created");
};

// Create Answer
document.getElementById("answerBtn").onclick = async () => {

  const offer = JSON.parse(remoteSDP.value);

  await pc.setRemoteDescription(offer);

  const answer = await pc.createAnswer();

  await pc.setLocalDescription(answer);

  log("Answer created");
};

// Set Remote Description
document.getElementById("remoteBtn").onclick = async () => {

  const answer = JSON.parse(remoteSDP.value);

  await pc.setRemoteDescription(answer);

  log("Remote description set");
};

// Send Message
document.getElementById("sendBtn").onclick = () => {

  const text = document.getElementById("messageInput").value;

  if (!dataChannel) {
    log("No data channel");
    return;
  }

  if (dataChannel.readyState !== "open") {
    log("Data channel not open");
    return;
  }

  dataChannel.send(text);

  log("You: " + text);

  document.getElementById("messageInput").value = "";
};

</script>

</body>
</html>
