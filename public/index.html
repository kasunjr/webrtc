<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC QR Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-one"></div>
    <div class="bg-shape bg-two"></div>

    <main class="app-shell">
      <section class="panel panel-main">
        <p class="eyebrow">Local Network Chat</p>
        <h1>WebRTC + QR Room</h1>
        <p class="subtitle">
          Device A creates a room. Devices B and C scan the QR to join instantly.
        </p>

        <div class="status-grid">
          <div class="status-card">
            <span>Role</span>
            <strong id="roleLabel">Detecting...</strong>
          </div>
          <div class="status-card">
            <span>Room</span>
            <strong id="roomLabel">-</strong>
          </div>
          <div class="status-card">
            <span>Peers</span>
            <strong id="peerCount">0</strong>
          </div>
        </div>

        <div class="controls">
          <label class="input-block">
            Display Name
            <input id="nameInput" type="text" maxlength="24" placeholder="Your name" />
          </label>

          <div class="row-buttons">
            <button id="createRoomBtn" type="button">Create New Room (A)</button>
            <button id="scanQrBtn" type="button" class="ghost">Scan QR (B/C)</button>
          </div>
        </div>
      </section>

      <section class="panel panel-side">
        <h2>Join QR</h2>
        <canvas id="qrCanvas" width="220" height="220" aria-label="Room QR code"></canvas>
        <p id="joinUrl" class="mono"></p>
        <button id="copyUrlBtn" type="button" class="ghost">Copy Join Link</button>

        <div id="scannerWrap" class="scanner-wrap hidden">
          <div id="scanner"></div>
        </div>
      </section>

      <section class="panel panel-chat">
        <h2>Chat</h2>
        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <input
            id="chatInput"
            type="text"
            maxlength="500"
            placeholder="Type a message and hit Enter"
            autocomplete="off"
          />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="app.js"></script>
  </body>
</html>
