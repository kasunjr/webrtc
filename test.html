<!DOCTYPE html>
<html>
<head>
  <title>Simple WebRTC Chat</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 20px auto;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
    }

    #messages {
      border: 1px solid #ccc;
      height: 200px;
      overflow-y: auto;
      padding: 10px;
      margin-top: 10px;
    }

    input {
      width: 80%;
      padding: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>WebRTC Text Chat</h2>

<button id="createOffer">Create Offer</button>
<button id="createAnswer">Create Answer</button>

<textarea id="localSDP" placeholder="Local SDP"></textarea>
<textarea id="remoteSDP" placeholder="Paste Remote SDP Here"></textarea>

<button id="setRemote">Set Remote SDP</button>

<div id="messages"></div>

<input type="text" id="messageInput" placeholder="Type message..." />
<button id="sendBtn">Send</button>

<script>
  let pc = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" }
    ]
  });

  let channel;

  const messages = document.getElementById("messages");

  function log(msg) {
    messages.innerHTML += `<div>${msg}</div>`;
  }

  // ICE Candidate Handling
  pc.onicecandidate = async (event) => {
    if (!event.candidate) {
      document.getElementById("localSDP").value =
        JSON.stringify(pc.localDescription);
    }
  };

  // Receive Data Channel
  pc.ondatachannel = (event) => {
    channel = event.channel;

    channel.onmessage = (e) => {
      log("Peer: " + e.data);
    };

    channel.onopen = () => {
      log("Connected!");
    };
  };

  // Create Offer
  document.getElementById("createOffer").onclick = async () => {
    channel = pc.createDataChannel("chat");

    channel.onmessage = (e) => {
      log("Peer: " + e.data);
    };

    channel.onopen = () => {
      log("Connected!");
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
  };

  // Create Answer
  document.getElementById("createAnswer").onclick = async () => {
    const remoteSDP = JSON.parse(
      document.getElementById("remoteSDP").value
    );

    await pc.setRemoteDescription(remoteSDP);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
  };

  // Set Remote SDP
  document.getElementById("setRemote").onclick = async () => {
    const remoteSDP = JSON.parse(
      document.getElementById("remoteSDP").value
    );

    await pc.setRemoteDescription(remoteSDP);

    log("Remote SDP Set");
  };

  // Send Message
  document.getElementById("sendBtn").onclick = () => {
    const input = document.getElementById("messageInput");

    if (channel && channel.readyState === "open") {
      channel.send(input.value);

      log("You: " + input.value);

      input.value = "";
    }
  };
</script>

</body>
</html>
